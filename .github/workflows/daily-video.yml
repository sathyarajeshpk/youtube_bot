name: Daily YouTube Video Bot

on:
  schedule:
    # Runs at 06:00 UTC every day (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  upload-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. System deps (fonts + ffmpeg) ──────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-dejavu-extra \
            imagemagick
          echo "✅ System deps installed"
          # Verify font exists (the bot needs this)
          fc-list | grep -i dejavu || echo "⚠️ DejaVu font not found in fc-list"
          find /usr/share/fonts -name "DejaVuSans-Bold.ttf" 2>/dev/null | head -3

      # ── 4. Python deps ───────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python deps installed"

      # ── 5. Verify secrets are present ────────────────────────────
      - name: Verify secrets
        run: |
          if [ -z "$GROQ_API_KEY" ]; then echo "❌ GROQ_API_KEY missing"; exit 1; fi
          if [ -z "$PEXELS_API_KEY" ]; then echo "❌ PEXELS_API_KEY missing"; exit 1; fi
          if [ -z "$YOUTUBE_TOKEN_JSON" ]; then echo "❌ YOUTUBE_TOKEN_JSON missing"; exit 1; fi
          echo "✅ All secrets present"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

      # ── 6. Run the bot ───────────────────────────────────────────
      - name: Run video bot
        run: python main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
