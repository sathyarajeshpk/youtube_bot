name: 🎬 Daily YouTube Video Bot (Tamil + English)

on:
  schedule:
    - cron: '30 4 * * *'    # 10:00 AM IST daily
  workflow_dispatch:

jobs:
  generate-and-upload:
    name: Generate & Upload Tamil + English Videos
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 🎞️ Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu \
            fonts-dejavu-core \
            fonts-dejavu-extra \
            fontconfig
          fc-cache -fv

      - name: 🔍 Verify font installed
        run: find /usr/share/fonts -name "DejaVuSans-Bold.ttf" | head -5

      - name: 📦 Install Python packages
        run: pip install -r requirements.txt

      - name: 🚀 Run video pipeline (Tamil + English)
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python main.py

      - name: ✅ Done
        if: success()
        run: echo "🎉 Tamil + English videos uploaded!"

      - name: ❌ Failed
        if: failure()
        run: echo "Pipeline failed — check logs above."
